name: Build DLL

on: 
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022  # <-- ВАЖНО: используем windows-2022, а не windows-latest!
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1  # <-- Это действие настраивает cl.exe
      
    - name: Compile DLL
      run: |
        cl.exe /LD /MT /EHsc /std:c++17 main.cpp /Fe:CS2_Cheat.dll /link gdi32.lib user32.lib
      shell: cmd
      
    - name: Upload DLL
      uses: actions/upload-artifact@v4
      with:
        name: CS2-Cheat-DLL
        path: CS2_Cheat.dll
