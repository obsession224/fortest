name: Build DLL

on: push

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Compile
      run: |
        cl.exe /LD /MT /EHsc /std:c++17 main.cpp /Fe:CS2_Cheat.dll /link gdi32.lib user32.lib
    - uses: actions/upload-artifact@v4
      with:
        name: DLL
        path: CS2_Cheat.dll
